<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hors connexion - JàmmSanté</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', 'DM Sans', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, hsl(210, 40%, 98%), hsl(173, 45%, 94%));
      padding: 1.5rem;
      color: hsl(222, 47%, 11%);
    }
    .container {
      text-align: center;
      max-width: 420px;
    }
    .icon {
      width: 80px; height: 80px; margin: 0 auto 1.5rem;
      background: hsl(173, 58%, 39% / 0.12);
      border-radius: 1.25rem;
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 40px; height: 40px; color: hsl(173, 58%, 39%); }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
    p { color: hsl(222, 10%, 45%); line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      background: hsl(173, 58%, 39%);
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: background 0.2s;
    }
    button:hover { background: hsl(173, 58%, 28%); }
    button svg { width: 18px; height: 18px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 11-12.728 0M12 9v4m0 4h.01" />
      </svg>
    </div>
    <h1>Vous êtes hors connexion</h1>
    <p>Impossible de se connecter au serveur. Vérifiez votre connexion Internet et réessayez.</p>
    <button onclick="window.location.reload()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
      </svg>
      Réessayer
    </button>
  </div>
</body>
</html>
